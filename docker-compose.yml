services:

  # ── Python / FastAPI backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .          # build context = repo root (where Dockerfile is)
      dockerfile: Dockerfile
    ports:
      - "8000:8000"       # host:container — access at localhost:8000
    env_file:
      - .env              # injects BINANCE_TESTNET_API_KEY etc. at runtime
                          # the .env file is NOT baked into the image
    volumes:
      # Mount data and results directories so the container can read CSVs
      # and write grid search output without rebuilding the image.
      - ./data:/app/data:ro          # :ro = read-only (container can't delete your data)
      - ./results:/app/results       # read-write (backtest writes results here)
    restart: unless-stopped          # auto-restart if it crashes

  # ── React / nginx frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8080:80"         # access at http://localhost:8080
    depends_on:
      - backend           # docker-compose starts backend first
    restart: unless-stopped

# Both services are on the same default network automatically.
# "backend" hostname resolves to the backend container inside that network.
