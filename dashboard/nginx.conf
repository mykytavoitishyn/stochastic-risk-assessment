server {
    listen 80;

    # Serve the React app for all non-API routes.
    # "try_files" makes client-side routing work:
    # if /some-page doesn't exist as a file, return index.html
    # and let React Router handle it.
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to the FastAPI backend.
    # "backend" is the service name in docker-compose — Docker resolves it
    # to the container's internal IP automatically.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
